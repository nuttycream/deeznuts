base_url = "https://johnnacion.dev"
title = "johns portfolio"
generate_feeds = true
compile_sass = true
minify_html = true
taxonomies = [{ name = "tags" }]

[markdown]
highlight_code = true
highlight_theme = "ayu-light"

[extra]
toc = true
use_cdn = true
#favicon = "/icon/favicon.png"
theme = "toggle"              
fancy_code = true
dynamic_note = true 
mathjax = true
mathjax_dollar_inline_enable = true

menu = [
    { name = "/posts", url = "/posts", weight = 1 },
    { name = "/about", url = "/about", weight = 2 },
]

socials = [
    { name = "linkedin", url = "https://www.linkedin.com/in/john-carter-114a57357/", icon = "linkedin" },
    { name = "github", url = "https://github.com/nuttycream", icon = "github" },
]

stylesheets = [
]

[extra.analytics]
enabled = true

[extra.analytics.goatcounter]
user = "nuttycream"
