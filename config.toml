# The URL the site will be built for
base_url = "https://johnnacion.dev"

theme = "apollo"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
toc = true
use_cdn = false
theme = "toggle"
fancy_code = true

menu = [
    { name = "/projects", url = "/projects", weight = 1 },
    { name = "/about", url = "/about", weight = 2 },
]

socials = [
    { name = "linkedin", url = "https://twitter.com/not_matthias", icon = "linkedin" },
    { name = "github", url = "https://github.com/nuttycream", icon = "github" },
]
