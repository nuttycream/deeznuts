base_url = "https://johnnacion.dev"
title = "johns website"
generate_feeds = true
compile_sass = true
minify_html = true
taxonomies = [{ name = "tags" }]

[markdown]
extra_syntaxes_and_themes = [
    "syntaxes",
    "syntaxes/cyberdream"
]
highlight_code = true
highlight_theme = "cyberdream"
highlight_themes_css = [
  { theme = "cyberdream", filename = "syntax-theme-dark.css" },
  { theme = "cyberdream-light", filename = "syntax-theme-light.css" },
]

[extra]
toc = true
use_cdn = true
#favicon = "/icon/favicon.png"
theme = "dark"              
fancy_code = true
dynamic_note = true 
mathjax = true
mathjax_dollar_inline_enable = true

menu = [
    { name = "/ramblings", url = "/posts", weight = 1 },
    #{ name = "/projects", url = "/projects", weight = 2 },
    { name = "/about", url = "/about", weight = 2 },
]

socials = [
    { name = "linkedin", url = "https://www.linkedin.com/in/john-carter-114a57357/", icon = "linkedin" },
    { name = "github", url = "https://github.com/nuttycream", icon = "github" },
]

stylesheets = [
]

[extra.analytics]
enabled = true

[extra.analytics.goatcounter]
user = "nuttycream"
