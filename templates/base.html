<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ site_url }}favicon.ico">
    <title>{{ title }}</title>
  </head>
  <body>
    <div class="container">
      <header>
        <a class="nav-link" href="/">
          <img src="{{ site_url }}assets/nutty.gif">
        </a>
        <img src="{{ site_url }}assets/nixos.gif">
        <img src="{{ site_url }}assets/neovim.png">
        <hr>
      </header>

      <nav>
        <ul class="nav-list">
          {% for post in sections.posts %}
          <li class="nav-item">
            <div class="nav-row">
              <a class="nav-link" href="{{ post.url }}">{{ post.title }}</a>
              {% if post.date %}
              <span class="post-date">{{ post.date }}</span>
              {% endif %}
            </div>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <div class="content">
        {{ content | safe }}
      </div>
    </div>
    <script src="{{ site_url }}assets/vim.js"></script>
  </body>
</html>
