<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="{{ site_url }}favicon.ico">
    <title>{{ title }}</title>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <img src="{{ site_url }}assets/nixos.gif">
        <h1 class="site-title">{{ title }}</h1>
      </header>

      <nav>
        <ul class="nav-list">
          {% for post in sections.posts %}
          <li class="nav-item">
            <a class="nav-link" href="{{ post.url }}">{{ post.title }}</a>
            {% if post.description %}
            <p class="post-description">{{ post.description }}</p>
            {% endif %}
            {% if post.date %}
            <span class="post-date">{{ post.date }}</span>
            {% endif %}
          </li>
          {% endfor %}
        </ul>
      </nav>

      <div class="content">
        {{ content | safe }}
      </div>
    </div>
  </body>
</html>
